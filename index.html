<!DOCTYPE html>
<html lang="en" class="default eldenring-start">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Multi-theme web browser start page by Pawel Osmolski.">
	<title>~/startpage</title>
	<link rel="icon" type="image/x-icon" href="assets/media/favicon/favicon.ico">
	<link rel="icon" sizes="192x192" href="assets/media/favicon/android-chrome-192x192.png">
	<link rel="apple-touch-icon" sizes="180x180" href="assets/media/favicon/apple-touch-icon.png">
	<link rel="stylesheet" type="text/css" href="dist/css/compiled.min.css">
</head>

<body class="fade-in jquery search">
	<a href="#main-content" class="sr-only skip-link">Skip to main content</a>

	<div id="startpage" class="container">
		<canvas id="canvas" aria-hidden="true"></canvas>
		<div class="container-inner">
			<header class="left-container" role="banner">
				<h1 id="Date">&nbsp;</h1>

				<div class="image">
					<a class="border" href="https://github.com/0rion-jpg" draggable="false" title="visit github for updates" aria-label="View the startpage project on GitHub"></a>
				</div>
			</header>

			<main id="main-content" class="right-container" role="main">
				<div class="head">
					<p>&gt; cd ~/<span class="blinking">_</span></p>
				</div>

				<div class="head-search">
					<!-- Search actions:
						https://duckduckgo.org/
						https://www.google.com/search
					-->
					<form method="get" action="https://www.google.com/search" autocomplete="off" id="search" role="search">
						<p>
							<label id="searchLabel" class="prefix" for="search-input">&gt; search ~/</label>
							<input class="search-field" id="search-input" type="text" name="q" maxlength="100" aria-labelledby="searchLabel" />
							<!--
							<textarea class="search-field" id="search-textarea" wrap="soft" type="text" name="q" maxlength="100" aria-labelledby="searchLabel"></textarea>
							-->
							<span class="blinking">_</span>
						</p>
					</form>
				</div>

				<nav class="bookmarks">
					<div class="category">
						<div class="links">
							<ul>
								<li class="title" role="heading" aria-level="2">daily</li>
								<li><a href="https://gmail.com">gmail</a></li>
								<li><a href="https://youtube.com">youtube</a></li>
							</ul>
						</div>
					</div>

			
					<div class="category">
						<div class="links slick-start slick-single-arrow">
							<ul>
								<li class="title" role="heading" aria-level="2"><a href="https://reddit.com">reddit</a></li>
								<li><a href="https://reddit.com/r/unixporn/">r/unixporn</a></li>
								<li><a href="https://reddit.com/r/explainlikeimfive/">r/explainlikeimfive</a></li>
							</ul>
							<ul>

							</ul>
						</div>
					</div>
				</nav>

				<nav class="bookmarks">
					<div class="category">
						<div class="links">
							<ul>
								<li class="title" role="heading" aria-level="2">shopping</li>
								<li><a href="https://amazon.com">amazon</a></li>
								<li><a href="https://ebay.com">ebay</a></li>
								<li><a href="https://bestbuy.com">bestbuy</a></li>
							</ul>
						</div>
					</div>
					
				</nav>
			</main>
			<!--
			<div class="about">
				<a href="https://github.com/Pav-Osmolski/startpage">pav-osmolski/startpage</a>
			</div>
			-->
		</div>
	</div>
	<script src="dist/js/async-loader.min.js"></script>
</body>

</html>
